<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2100FF" />
    <title>Emigrant — нет сети</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: max(1.5rem, env(safe-area-inset-top))
          max(1.5rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom))
          max(1.5rem, env(safe-area-inset-left));
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
      }
      img {
        width: 140px;
        height: auto;
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        max-width: 20rem;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #475569;
      }
      a {
        display: inline-flex;
        margin-top: 0.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        background: #2100ff;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <img src="/logo.png" width="280" height="80" alt="Emigrant" />
    <h1>Нет подключения к интернету</h1>
    <p>Откройте приложение снова, когда сеть будет доступна. Вход и данные дела требуют интернет.</p>
    <a href="/">Повторить</a>
  </body>
</html>
